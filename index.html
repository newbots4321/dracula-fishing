<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dracula Fishing</title>

<style>
body { margin:0; overflow:hidden; background:black; }

/* Player */
#player{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:160px;
}

/* Rope */
#rope{
  position:absolute;
  top:120px;
  left:50%;
  width:3px;
  background:white;
  height:0;
}

/* Hook */
#hook{
  position:absolute;
  width:15px;
  height:15px;
  background:yellow;
  border-radius:50%;
}

/* Water */
#water{
  position:absolute;
  bottom:0;
  width:100%;
  height:50%;
  background:url('water.gif');
  background-size:cover;
}

/* Fish */
.fish{
  position:absolute;
  width:70px;
}

/* Snake */
#snake{
  position:absolute;
  width:100px;
}

/* Score */
#score{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:20px;
}

/* Game Over */
#over{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  background:rgba(0,0,0,0.8);
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>

</head>
<body>

<img id="player" src="man.gif">

<div id="rope"></div>
<div id="hook"></div>

<div id="water"></div>

<img id="snake" src="snake.gif">

<div id="score">Score: 0</div>

<div id="over">
  <h1>Game Over</h1>
  <button onclick="restart()">Restart</button>
</div>

<audio id="fishSound" src="https://www.soundjay.com/button/button-3.mp3"></audio>
<audio id="snakeSound" src="https://www.soundjay.com/button/button-10.mp3"></audio>
<audio id="gameOverSound" src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3"></audio>

<script>

let rope = document.getElementById("rope");
let hook = document.getElementById("hook");

let ropeDown=false;
let ropeHeight=0;
let maxDepth = window.innerHeight*0.5;

let fish=null;
let fishDir=1;

let snake=document.getElementById("snake");
let snakeDir=1;

let caught=false;
let game=true;

let score=0;

/* Spawn Fish */
function spawnFish(){
  if(fish) fish.remove();

  fish=document.createElement("img");
  fish.src="fish1.gif";
  fish.className="fish";

  fish.x=Math.random()*window.innerWidth;
  fish.y=window.innerHeight*0.65;

  fish.style.left=fish.x+"px";
  fish.style.top=fish.y+"px";

  document.body.appendChild(fish);
}

/* Snake */
function initSnake(){
  snake.x=200;
  snake.y=window.innerHeight*0.75;
  snake.style.top=snake.y+"px";
}

/* Click */
document.onclick=()=>{
  if(game && !ropeDown && !caught){
    ropeDown=true;
  }
};

/* Loop */
function loop(){
  if(!game) return;

  /* Rope */
  if(ropeDown){
    ropeHeight+=12;
    if(ropeHeight>=maxDepth) ropeDown=false;
  }else{
    if(ropeHeight>0) ropeHeight-=12;
  }

  rope.style.height=ropeHeight+"px";
  hook.style.top=(120+ropeHeight)+"px";
  hook.style.left=rope.style.left;

  /* Fish move */
  if(fish && !caught){
    fish.x += 3 * fishDir;

    if(fish.x > window.innerWidth-80) fishDir=-1;
    if(fish.x < 0) fishDir=1;

    fish.style.left=fish.x+"px";
  }

  /* Snake move */
  snake.x += 2 * snakeDir;

  if(snake.x > window.innerWidth-120) snakeDir=-1;
  if(snake.x < 0) snakeDir=1;

  snake.style.left=snake.x+"px";

  /* Catch Fish */
  if(fish && collide(hook, fish) && !caught){
    caught=true;
    document.getElementById("fishSound").play();
  }

  /* Fish going up */
  if(caught && fish){
    fish.style.left = hook.style.left;
    fish.style.top = hook.style.top;

    if(parseInt(fish.style.top) < 150){
      fish.remove();
      caught=false;
      score++;
      document.getElementById("score").innerText="Score: "+score;

      spawnFish(); // unlimited fish
    }
  }

  /* Snake hit */
  if(collide(hook, snake)){
    document.getElementById("snakeSound").play();
    gameOver();
  }

  requestAnimationFrame(loop);
}

/* Collision */
function collide(a,b){
  let r1=a.getBoundingClientRect();
  let r2=b.getBoundingClientRect();

  return !(
    r1.top>r2.bottom ||
    r1.bottom<r2.top ||
    r1.left>r2.right ||
    r1.right<r2.left
  );
}

/* Game Over */
function gameOver(){
  game=false;
  document.getElementById("gameOverSound").play();
  document.getElementById("over").style.display="flex";
}

/* Restart */
function restart(){
  location.reload();
}

/* Start */
spawnFish();
initSnake();
loop();

</script>

</body>
</html>
