<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dracula Fishing</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: skyblue;
  font-family: Arial;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* SCORE */
#score {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 22px;
  font-weight: bold;
}

/* PLAYER */
#player {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 100px;
  background: url('man.gif') no-repeat center/contain;
  z-index: 3;
}

/* ROPE */
#rope {
  position: absolute;
  top: 100px;
  left: 50%;
  width: 4px;
  height: 0;
  background: black;
  z-index: 3; /* IMPORTANT FIX */
}

/* HOOK */
#hook {
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
  z-index: 3;
}

/* WATER */
#water {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: url('water.gif') no-repeat center/cover;
  z-index: 1;
  overflow: hidden;
}

/* FISH */
.fish {
  position: absolute;
  width: 70px;
  height: 70px;
  background-size: contain;
  background-repeat: no-repeat;
}

/* SNAKE */
.snake {
  position: absolute;
  width: 90px;
  height: 90px;
  background: url('snake.gif') no-repeat center/contain;
}

/* GAME OVER */
#gameOver {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  display: none;
  text-align: center;
  z-index: 5;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="player"></div>
  <div id="rope"></div>
  <div id="hook"></div>

  <div id="water"></div>

  <div id="gameOver">
    <h2>Game Over</h2>
    <button onclick="restartGame()">Restart</button>
  </div>
</div>

<script>
let rope = document.getElementById("rope");
let hook = document.getElementById("hook");
let water = document.getElementById("water");

let ropeDown = false;
let speed = 20;
let caughtFish = null;
let score = 0;

let fishTypes = ["fish1.gif", "fish2.gif"];

/* CREATE FISH */
function createFish() {
  let fish = document.createElement("div");
  fish.className = "fish";
  fish.style.backgroundImage =
    "url('" + fishTypes[Math.floor(Math.random()*fishTypes.length)] + "')";

  fish.style.left = Math.random() * (window.innerWidth - 80) + "px";
  fish.style.top = Math.random() * (water.clientHeight - 80) + "px";

  fish.dataset.type = "fish";
  water.appendChild(fish);
  move(fish);
}

/* CREATE SNAKE */
function createSnake() {
  let snake = document.createElement("div");
  snake.className = "snake";

  snake.style.left = Math.random() * (window.innerWidth - 100) + "px";
  snake.style.top = Math.random() * (water.clientHeight - 100) + "px";

  snake.dataset.type = "snake";
  water.appendChild(snake);
  move(snake);
}

/* MOVE */
function move(el) {
  let dir = Math.random() > 0.5 ? 1 : -1;

  setInterval(() => {
    let left = el.offsetLeft + dir * 2;

    if (left <= 0 || left >= water.clientWidth - 80) {
      dir *= -1;
    }

    el.style.left = left + "px";
  }, 20);
}

/* CLICK */
document.addEventListener("touchstart", startRope);
document.addEventListener("mousedown", startRope);

function startRope() {
  if (!ropeDown) ropeDown = true;
}

/* LOOP */
function loop() {
  let h = rope.offsetHeight;

  if (ropeDown) {
    rope.style.height = h + speed + "px";
  } else {
    rope.style.height = Math.max(0, h - speed) + "px";
  }

  hook.style.top = rope.offsetTop + rope.offsetHeight + "px";
  hook.style.left = rope.offsetLeft - 8 + "px";

  checkCollision();

  requestAnimationFrame(loop);
}

/* COLLISION */
function checkCollision() {
  let hookRect = hook.getBoundingClientRect();
  let items = document.querySelectorAll(".fish, .snake");

  items.forEach(el => {
    let rect = el.getBoundingClientRect();

    if (
      hookRect.left < rect.right &&
      hookRect.right > rect.left &&
      hookRect.top < rect.bottom &&
      hookRect.bottom > rect.top
    ) {
      if (el.dataset.type === "snake") {
        gameOver();
      } else {
        caughtFish = el;
        ropeDown = false;

        score++;
        document.getElementById("score").innerText = "Score: " + score;
      }
    }
  });

  /* FISH UP */
  if (caughtFish) {
    let hookY = hook.getBoundingClientRect().top;

    caughtFish.style.top = hookY + "px";
    caughtFish.style.left = hook.style.left;

    if (rope.offsetHeight <= 10) {
      caughtFish.remove();
      caughtFish = null;

      createFish(); // new fish
    }
  }

  /* LIMIT */
  if (rope.offsetHeight > window.innerHeight * 0.6) {
    ropeDown = false;
  }
}

/* GAME OVER */
function gameOver() {
  document.getElementById("gameOver").style.display = "block";
}

/* RESTART + ADSTERRA */
function restartGame() {
  window.location.href = "https://www.profitablecpmratenetwork.com/iy9ptsnc?key=26c69782d6098c9e1abc58f7ece9aa04";
}

/* AUTO START AFTER BACK */
window.onfocus = function() {
  location.reload();
};

/* INIT */
createFish();
createSnake();
createSnake();

loop();
</script>

</body>
</html>
