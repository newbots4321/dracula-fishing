<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fishing Game Pro</title>
<style>
  body { margin:0; overflow:hidden; }

  canvas {
    display:block;
    background:#87CEEB;
  }

  #restartBtn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 30px;
    font-size:20px;
    display:none;
    z-index:10;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>
<button id="restartBtn">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const restartBtn = document.getElementById("restartBtn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🔥 IMAGE PATH (GitHub RAW use karo)
const playerImg = new Image();
playerImg.src = "https://raw.githubusercontent.com/USERNAME/REPO/main/player.gif";

const fishImgs = [
  "fish1.gif",
  "https://raw.githubusercontent.com/USERNAME/REPO/main/fish2.gif",
  "https://raw.githubusercontent.com/USERNAME/REPO/main/fish3.gif"
];

let currentFishImg = new Image();
currentFishImg.src = fishImgs[0];

const snakeImg = new Image();
snakeImg.src = "https://raw.githubusercontent.com/USERNAME/REPO/main/snake.gif";

const waterImg = new Image();
waterImg.src = "https://raw.githubusercontent.com/USERNAME/REPO/main/water.gif";

// GAME VARIABLES
let player, rope, fish, snake, gameOver, fishIndex;

// INIT
function init(){
  player = {
    x: canvas.width/2 - 40,
    y: 20,
    w: 80,
    h: 80
  };

  rope = {
    x: player.x + 40,
    y: player.y + 80,
    length: 0,
    speed: 30,
    down: false,
    up: false,
    target: null
  };

  fishIndex = 0;

  spawnFish();
  spawnSnake();

  gameOver = false;
  restartBtn.style.display = "none";
}

// SPAWN
function spawnFish(){
  fishIndex = (fishIndex + 1) % fishImgs.length;
  currentFishImg = new Image();
  currentFishImg.src = fishImgs[fishIndex];

  fish = {
    x: Math.random() * (canvas.width-80),
    y: canvas.height/2 + 50,
    w: 80,
    h: 60,
    speed: 2 + Math.random()*2,
    dir: Math.random()>0.5?1:-1
  };
}

function spawnSnake(){
  snake = {
    x: Math.random() * (canvas.width-100),
    y: canvas.height/2 + 150,
    w: 100,
    h: 60,
    speed: 3,
    dir: Math.random()>0.5?1:-1
  };
}

// 🎯 TOUCH + CLICK FIX (IMPORTANT)
function shoot(){
  if(!rope.down && !rope.up && !gameOver){
    rope.down = true;
  }
}

canvas.addEventListener("touchstart", shoot);
canvas.addEventListener("mousedown", shoot);

// COLLISION
function hit(a,b){
  return a.x < b.x+b.w &&
         a.x+10 > b.x &&
         a.y < b.y+b.h &&
         a.y+10 > b.y;
}

// UPDATE
function update(){
  if(gameOver) return;

  if(rope.down){
    rope.length += rope.speed;

    let tip = { x: rope.x, y: rope.y + rope.length };

    if(hit(tip, fish)){
      rope.target = "fish";
      rope.down = false;
      rope.up = true;
    }

    if(hit(tip, snake)){
      gameOver = true;
      restartBtn.style.display = "block";
    }

    if(rope.y + rope.length > canvas.height){
      rope.down = false;
      rope.up = true;
    }
  }

  if(rope.up){
    rope.length -= rope.speed;

    if(rope.target === "fish"){
      fish.x = rope.x - 40;
      fish.y = rope.y + rope.length;
    }

    if(rope.length <= 0){
      rope.length = 0;
      rope.up = false;

      if(rope.target === "fish"){
        spawnFish();
      }

      rope.target = null;
    }
  }

  // movement
  fish.x += fish.speed * fish.dir;
  if(fish.x <=0 || fish.x >= canvas.width - fish.w){
    fish.dir *= -1;
  }

  snake.x += snake.speed * snake.dir;
  if(snake.x <=0 || snake.x >= canvas.width - snake.w){
    snake.dir *= -1;
  }
}

// DRAW
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // sky
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0,0,canvas.width,canvas.height/2);

  // water
  ctx.drawImage(waterImg, 0, canvas.height/2, canvas.width, canvas.height/2);

  // player
  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  // rope
  ctx.beginPath();
  ctx.moveTo(rope.x, rope.y);
  ctx.lineTo(rope.x, rope.y + rope.length);
  ctx.stroke();

  // fish
  ctx.drawImage(currentFishImg, fish.x, fish.y, fish.w, fish.h);

  // snake
  ctx.drawImage(snakeImg, snake.x, snake.y, snake.w, snake.h);

  if(gameOver){
    ctx.fillStyle = "red";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", canvas.width/2-130, canvas.height/2);
  }
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// 🔥 IMAGE LOAD FIX
let loaded = 0;
let total = 4;

function checkLoad(){
  loaded++;
  if(loaded >= total){
    init();
    loop();
  }
}

playerImg.onload = checkLoad;
snakeImg.onload = checkLoad;
waterImg.onload = checkLoad;
currentFishImg.onload = checkLoad;

// RESTART
restartBtn.onclick = () => {
  init();
};
</script>

</body>
</html>
