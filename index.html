<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dracula Fishing</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* Intro Screen */
#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#startBtn {
  padding: 10px 20px;
  font-size: 20px;
  margin-top: 20px;
  cursor: pointer;
}

/* Game */
#game {
  display: none;
}

/* Player */
#player {
  position: absolute;
  top: 20px;
  left: 45%;
  width: 120px;
}

/* Rope */
#rope {
  position: absolute;
  width: 4px;
  background: white;
  top: 100px;
  left: 50%;
  height: 0;
}

/* Hook */
#hook {
  position: absolute;
  width: 20px;
  height: 20px;
  background: yellow;
  border-radius: 50%;
}

/* Water */
#water {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: url('water.gif');
  background-size: cover;
}

/* Fish */
.fish {
  position: absolute;
  width: 60px;
}

/* Snake */
#snake {
  position: absolute;
  width: 80px;
}

/* Score */
#score {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 20px;
}

/* Game Over */
#gameOver {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <h1>🧛 Dracula Fishing</h1>
  <button id="startBtn">Start Game</button>
</div>

<!-- Game -->
<div id="game">
  <img id="player" src="man.gif">
  <div id="rope"></div>
  <div id="hook"></div>
  <div id="water"></div>
  <img id="snake" src="snake.gif">
  <div id="score">Score: 0</div>
</div>

<!-- Game Over -->
<div id="gameOver">
  <h1>Game Over</h1>
  <button onclick="restartGame()">Restart</button>
</div>

<!-- Sounds -->
<audio id="fishSound" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>
<audio id="snakeSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>

<script>

let rope = document.getElementById("rope");
let hook = document.getElementById("hook");
let fishSound = document.getElementById("fishSound");
let snakeSound = document.getElementById("snakeSound");

let gameRunning = false;
let ropeDown = false;
let score = 0;

/* Start Game */
document.getElementById("startBtn").onclick = () => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("game").style.display = "block";
  startGame();
};

function startGame() {
  gameRunning = true;
  score = 0;
  updateScore();
  spawnFish();
  spawnSnake();
}

/* Rope control */
document.addEventListener("click", () => {
  if (!ropeDown && gameRunning) {
    ropeDown = true;
  }
});

function gameLoop() {
  if (!gameRunning) return;

  let ropeHeight = parseInt(rope.style.height || 0);

  if (ropeDown) {
    ropeHeight += 10;
    if (ropeHeight > window.innerHeight / 2) {
      ropeDown = false;
    }
  } else {
    if (ropeHeight > 0) ropeHeight -= 10;
  }

  rope.style.height = ropeHeight + "px";

  hook.style.top = (100 + ropeHeight) + "px";
  hook.style.left = rope.style.left;

  checkCollision();

  requestAnimationFrame(gameLoop);
}

/* Fish spawn */
function spawnFish() {
  let fish = document.createElement("img");
  fish.src = "fish1.gif";
  fish.className = "fish";

  fish.style.bottom = "50px";
  fish.style.left = Math.random() * 80 + "%";

  document.getElementById("game").appendChild(fish);

  fish.move = setInterval(() => {
    let x = parseFloat(fish.style.left);
    fish.style.left = (x + 0.2) + "%";
  }, 50);
}

/* Snake spawn */
function spawnSnake() {
  let snake = document.getElementById("snake");
  snake.style.bottom = "20px";
  snake.style.left = "20%";
}

/* Collision */
function checkCollision() {
  let fishes = document.querySelectorAll(".fish");
  let snake = document.getElementById("snake");

  fishes.forEach(fish => {
    if (isCollide(hook, fish)) {
      fishSound.play();

      fish.remove();
      score++;
      updateScore();

      spawnFish(); // NEW fish instantly
    }
  });

  if (isCollide(hook, snake)) {
    snakeSound.play();
    gameOver();
  }
}

/* Collision logic */
function isCollide(a, b) {
  let aRect = a.getBoundingClientRect();
  let bRect = b.getBoundingClientRect();

  return !(
    aRect.top > bRect.bottom ||
    aRect.bottom < bRect.top ||
    aRect.right < bRect.left ||
    aRect.left > bRect.right
  );
}

/* Score */
function updateScore() {
  document.getElementById("score").innerText = "Score: " + score;
}

/* Game Over */
function gameOver() {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "flex";
}

/* Restart + Ad */
function restartGame() {
  window.location.href = "https://your-adsterra-link.com";

  setTimeout(() => {
    document.getElementById("gameOver").style.display = "none";
    document.getElementById("intro").style.display = "flex";
  }, 1000);
}

gameLoop();

</script>

</body>
</html>
