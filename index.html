<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fishing Game</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: skyblue;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* PLAYER (UPAR WALA) */
#player {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 100px;
  background: url('man.gif') no-repeat center/contain;
}

/* ROPE */
#rope {
  position: absolute;
  top: 100px;
  left: 50%;
  width: 4px;
  height: 0;
  background: black;
}

/* HOOK */
#hook {
  position: absolute;
  width: 20px;
  height: 20px;
  background: brown;
}

/* WATER */
#water {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: url('water.gif') repeat;
}

/* FISH */
.fish {
  position: absolute;
  width: 60px;
  height: 60px;
  background-size: contain;
  background-repeat: no-repeat;
}

/* SNAKE */
.snake {
  position: absolute;
  width: 80px;
  height: 80px;
  background: url('snake.gif') no-repeat center/contain;
}

/* GAME OVER */
#gameOver {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  display: none;
  text-align: center;
}

button {
  padding: 10px 20px;
}
</style>
</head>

<body>

<div id="game">
  <div id="player"></div>
  <div id="rope"></div>
  <div id="hook"></div>
  <div id="water"></div>

  <div id="gameOver">
    <h2>Game Over</h2>
    <button onclick="restartGame()">Restart</button>
  </div>
</div>

<script>
let rope = document.getElementById("rope");
let hook = document.getElementById("hook");
let gameOverBox = document.getElementById("gameOver");

let ropeDown = false;
let speed = 15;
let caughtFish = null;

let fishTypes = ["fish1.gif", "fish2.gif"];

function createFish() {
  let fish = document.createElement("div");
  fish.className = "fish";
  fish.style.backgroundImage = "url('" + fishTypes[Math.floor(Math.random()*fishTypes.length)] + "')";
  fish.style.left = Math.random() * (window.innerWidth - 60) + "px";
  fish.style.bottom = "50px";
  fish.dataset.type = "fish";
  document.getElementById("game").appendChild(fish);
  moveFish(fish);
}

function createSnake() {
  let snake = document.createElement("div");
  snake.className = "snake";
  snake.style.left = Math.random() * (window.innerWidth - 80) + "px";
  snake.style.bottom = "120px";
  snake.dataset.type = "snake";
  document.getElementById("game").appendChild(snake);
  moveFish(snake);
}

function moveFish(el) {
  let dir = 1;
  setInterval(() => {
    let left = parseInt(el.style.left);
    left += dir * 2;
    if (left <= 0 || left >= window.innerWidth - 80) dir *= -1;
    el.style.left = left + "px";
  }, 20);
}

/* CLICK = ROPE DOWN */
document.addEventListener("click", () => {
  if (!ropeDown) {
    ropeDown = true;
  }
});

function gameLoop() {
  let h = rope.offsetHeight;

  if (ropeDown) {
    rope.style.height = h + speed + "px";
  } else {
    rope.style.height = Math.max(0, h - speed) + "px";
  }

  hook.style.top = rope.offsetTop + rope.offsetHeight + "px";
  hook.style.left = rope.offsetLeft - 8 + "px";

  checkCollision();

  requestAnimationFrame(gameLoop);
}

function checkCollision() {
  let hookRect = hook.getBoundingClientRect();
  let items = document.querySelectorAll(".fish, .snake");

  items.forEach(el => {
    let rect = el.getBoundingClientRect();

    if (
      hookRect.left < rect.right &&
      hookRect.right > rect.left &&
      hookRect.top < rect.bottom &&
      hookRect.bottom > rect.top
    ) {
      if (el.dataset.type === "snake") {
        gameOver();
      } else {
        caughtFish = el;
        ropeDown = false;
      }
    }
  });

  /* FISH KO UPAR LANA */
  if (caughtFish) {
    let hookY = hook.getBoundingClientRect().top;
    caughtFish.style.top = hookY + "px";
    caughtFish.style.left = hook.style.left;

    if (rope.offsetHeight <= 10) {
      caughtFish.remove();
      caughtFish = null;

      /* NEW FISH */
      createFish();
    }
  }

  /* MISS → ROPE UP FAST */
  if (rope.offsetHeight > window.innerHeight * 0.5) {
    ropeDown = false;
  }
}

function gameOver() {
  gameOverBox.style.display = "block";
}

function restartGame() {
  location.reload();
}

/* INIT */
createFish();
createSnake();
createSnake();
gameLoop();
</script>

</body>
</html>
