<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fishing Game</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ================== IMAGES (CHANGE GIF HERE) ==================
const playerImg = new Image();
playerImg.src = "man.gif"; // 👈 change player gif

const fishImgs = [
  "fish1.gif",
  "fish2.gif"
].map(src => {
  let img = new Image();
  img.src = src;
  return img;
});

const snakeImg = new Image();
snakeImg.src = "snake.gif"; // 👈 change snake gif

// ================== GAME VAR ==================
let rope = {
  x: canvas.width / 2,
  y: 100,
  length: 0,
  speed: 25,
  goingDown: false,
  goingUp: false,
  target: null
};

let player = {
  x: canvas.width / 2 - 50,
  y: 20,
  width: 100,
  height: 80
};

let fish = {};
let snake = {};
let gameOver = false;

// ================== SPAWN ==================
function spawnFish() {
  fish = {
    x: Math.random() * (canvas.width - 100),
    y: canvas.height / 2 + 50,
    width: 80,
    height: 60,
    speed: 2 + Math.random() * 2,
    dir: Math.random() > 0.5 ? 1 : -1,
    img: fishImgs[Math.floor(Math.random() * fishImgs.length)]
  };
}

function spawnSnake() {
  snake = {
    x: Math.random() * (canvas.width - 100),
    y: canvas.height / 2 + 150,
    width: 100,
    height: 70,
    speed: 3,
    dir: Math.random() > 0.5 ? 1 : -1
  };
}

spawnFish();
spawnSnake();

// ================== CLICK ==================
canvas.addEventListener("click", () => {
  if (!rope.goingDown && !rope.goingUp && !gameOver) {
    rope.goingDown = true;
  }
});

// ================== COLLISION ==================
function isColliding(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + 5 > b.x &&
    a.y < b.y + b.height &&
    a.y + 10 > b.y
  );
}

// ================== UPDATE ==================
function update() {
  if (gameOver) return;

  // rope down
  if (rope.goingDown) {
    rope.length += rope.speed;

    let tip = {
      x: rope.x,
      y: rope.y + rope.length
    };

    // fish catch
    if (isColliding(tip, fish)) {
      rope.target = "fish";
      rope.goingDown = false;
      rope.goingUp = true;
    }

    // snake hit
    if (isColliding(tip, snake)) {
      gameOver = true;
    }

    // miss
    if (rope.y + rope.length > canvas.height) {
      rope.goingDown = false;
      rope.goingUp = true;
    }
  }

  // rope up
  if (rope.goingUp) {
    rope.length -= rope.speed;

    if (rope.target === "fish") {
      fish.y = rope.y + rope.length;
      fish.x = rope.x - 40;
    }

    if (rope.length <= 0) {
      rope.length = 0;
      rope.goingUp = false;

      if (rope.target === "fish") {
        spawnFish(); // new fish
      }

      rope.target = null;
    }
  }

  // move fish
  fish.x += fish.speed * fish.dir;
  if (fish.x <= 0 || fish.x >= canvas.width - fish.width) {
    fish.dir *= -1;
  }

  // move snake
  snake.x += snake.speed * snake.dir;
  if (snake.x <= 0 || snake.x >= canvas.width - snake.width) {
    snake.dir *= -1;
  }
}

// ================== DRAW ==================
function draw() {
  // sky
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0, 0, canvas.width, canvas.height / 2);

  // water
  ctx.fillStyle = "#1E90FF";
  ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

  // player
  ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

  // rope
  ctx.beginPath();
  ctx.moveTo(rope.x, rope.y);
  ctx.lineTo(rope.x, rope.y + rope.length);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;
  ctx.stroke();

  // fish
  ctx.drawImage(fish.img, fish.x, fish.y, fish.width, fish.height);

  // snake
  ctx.drawImage(snakeImg, snake.x, snake.y, snake.width, snake.height);

  // game over
  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "50px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2 - 150, canvas.height / 2);
  }
}

// ================== LOOP ==================
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
